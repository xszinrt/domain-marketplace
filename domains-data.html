<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بيانات النطاقات</title>
</head>
<body>

<!-- كل نطاق عبارة عن عنصر <article class="domain-lot"> بخصائص data-* -->

<article class="domain-lot"
  data-lot="01"
  data-domain="ExampleOne.com"
  data-extension=".com"
  data-category="تقنية"
  data-price="2,500"
  data-currency="USD"
  data-status="متاح">
  <p class="description">نطاق تجريبي قصير وسهل التذكر، مناسب لمشاريع تقنية ناشئة.</p>
</article>

<article class="domain-lot"
  data-lot="02"
  data-domain="SampleShop.store"
  data-extension=".store"
  data-category="تجارة إلكترونية"
  data-price="850"
  data-currency="USD"
  data-status="متاح">
  <p class="description">نطاق تجريبي يناسب متاجر التجارة الإلكترونية الجديدة.</p>
</article>

<article class="domain-lot"
  data-lot="03"
  data-domain="DemoAI.ai"
  data-extension=".ai"
  data-category="ذكاء اصطناعي"
  data-price="6,200"
  data-currency="USD"
  data-status="قيد المزايدة">
  <p class="description">نطاق تجريبي ضمن فئة .ai المطلوبة بقوة في السوق حاليًا.</p>
</article>

</body>
</html>
