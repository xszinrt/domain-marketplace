<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سوق النطاقات — دفتر المزاد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDE7DA;
    --paper-dark:#E2DAC8;
    --ink:#1B2A4A;
    --ink-soft:#3A4A6B;
    --gold:#C08A34;
    --stamp-red:#8C3B2E;
    --rule:#c9bfa4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(27,42,74,0.035) 0px, rgba(27,42,74,0.035) 1px, transparent 1px, transparent 32px);
    color:var(--ink);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
  }
  header{
    max-width:920px;
    margin:0 auto;
    padding:56px 24px 28px;
    text-align:center;
    border-bottom:3px double var(--ink);
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.18em;
    font-size:12px;
    color:var(--stamp-red);
    text-transform:uppercase;
    margin-bottom:14px;
  }
  h1{
    font-family:'Amiri', serif;
    font-weight:700;
    font-size:clamp(34px, 6vw, 54px);
    color:var(--ink);
  }
  .subtitle{
    margin-top:10px;
    font-size:15px;
    color:var(--ink-soft);
  }
  main{
    max-width:920px;
    margin:0 auto;
    padding:20px 24px 80px;
  }
  #status{
    text-align:center;
    padding:40px 0;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
  }
  .lot{
    display:grid;
    grid-template-columns:88px 1fr auto;
    gap:22px;
    align-items:start;
    padding:28px 4px;
    border-bottom:1px solid var(--rule);
    opacity:0;
    transform:translateY(10px);
    animation:rise 0.5s ease forwards;
  }
  .lot:last-child{ border-bottom:3px double var(--ink); }
  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }

  .lot-num{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:var(--stamp-red);
    letter-spacing:0.05em;
    padding-top:6px;
  }
  .lot-num span{
    display:block;
    font-size:10px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .lot-body h2{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:22px;
    color:var(--ink);
    direction:ltr;
    text-align:right;
    unicode-bidi:isolate;
  }
  .lot-body h2 .ext{ color:var(--gold); }
  .lot-meta{
    display:flex;
    gap:10px;
    margin:8px 0 10px;
    font-size:12px;
    flex-wrap:wrap;
  }
  .tag{
    border:1px solid var(--ink-soft);
    border-radius:2px;
    padding:2px 9px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
  }
  .tag.status-available{ border-color:#4d7a4d; color:#4d7a4d; }
  .tag.status-bidding{ border-color:var(--stamp-red); color:var(--stamp-red); }
  .lot-desc{
    font-size:14px;
    color:var(--ink-soft);
    line-height:1.7;
    max-width:52ch;
  }
  .lot-price{
    text-align:left;
    padding-top:4px;
    white-space:nowrap;
  }
  .price-label{
    font-size:10px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.08em;
    text-align:right;
  }
  .price-value{
    font-family:'IBM Plex Mono', monospace;
    font-size:20px;
    font-weight:600;
    color:var(--ink);
    text-align:right;
    direction:ltr;
  }
  footer{
    max-width:920px;
    margin:0 auto;
    padding:0 24px 60px;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0.05em;
  }
  @media (max-width:600px){
    .lot{ grid-template-columns:1fr; }
    .lot-price{ text-align:right; }
    .price-label, .price-value{ text-align:right; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">دفتر المزاد — نُسخة تجريبية</div>
  <h1>سوق النطاقات</h1>
  <p class="subtitle">ثلاثة نطاقات معروضة، مرتّبة كسجل مزاد. البيانات تُقرأ من ملف domains-data.txt.</p>
</header>

<main>
  <div id="status">جاري تحميل السجل…</div>
  <div id="lots"></div>
</main>

<footer>DOMAINS.JSON · قابل للقراءة مباشرة كنص خام</footer>

<script>
async function loadDomains(){
  const statusEl = document.getElementById('status');
  const lotsEl = document.getElementById('lots');
  try{
    const res = await fetch('domains-data.txt');
    if(!res.ok) throw new Error('تعذّر تحميل الملف');
    const text = await res.text();

    const domains = text
      .split('\n')
      .map(line => line.trim())
      .filter(line => line.length > 0)
      .map(line => {
        const [lot, domain, extension, category, price, currency, status, description] = line.split('|');
        return { lot, domain, extension, category, price, currency, status, description };
      });

    statusEl.style.display = 'none';

    domains.forEach((d, i) => {
      const statusClass = d.status === 'متاح' ? 'status-available' : 'status-bidding';
      const el = document.createElement('div');
      el.className = 'lot';
      el.style.animationDelay = (i * 0.08) + 's';
      el.innerHTML = `
        <div class="lot-num">LOT<span>${d.lot}</span></div>
        <div class="lot-body">
          <h2>${escapeHtml(d.domain.replace(d.extension,''))}<span class="ext">${escapeHtml(d.extension)}</span></h2>
          <div class="lot-meta">
            <span class="tag">${escapeHtml(d.category)}</span>
            <span class="tag ${statusClass}">${escapeHtml(d.status)}</span>
          </div>
          <p class="lot-desc">${escapeHtml(d.description)}</p>
        </div>
        <div class="lot-price">
          <div class="price-label">السعر المطلوب</div>
          <div class="price-value">${escapeHtml(d.price)} ${escapeHtml(d.currency)}</div>
        </div>
      `;
      lotsEl.appendChild(el);
    });
  }catch(err){
    statusEl.textContent = 'تعذّر تحميل بيانات النطاقات: ' + err.message;
  }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadDomains();
</script>

</body>
</html>
